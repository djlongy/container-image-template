#     expire_in: 1 month
#   rules: *build-rules
#
# trivy-sbom-postscan:
#   stage: postscan
#   image: ${ALPINE_IMAGE}
#   needs:
#     - job: build
#       artifacts: true
#   before_script:
#     - *install-tools
