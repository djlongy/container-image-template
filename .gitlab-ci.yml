# ═══════════════════════════════════════════════════════════════════
# INGEST — post SBOM to configured sinks
# ═══════════════════════════════════════════════════════════════════
# Runs scripts/sbom-post.sh which ships the CycloneDX JSON to whatever
# sink is configured (generic webhook or OWASP Dependency-Track).
# No-op if no sink env vars are set — safe to leave enabled even
# before the business picks an SBOM platform.
sbom-ingest:
  stage: ingest
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
    # Default consumer is syft-sbom-postscan — change to
    # xray-sbom-postscan (or trivy-sbom-postscan when re-enabled) to
    # ship a different producer's SBOM. All write the same SBOM_FILE
    # so sbom-post.sh doesn't care which one ran.
    - job: syft-sbom-postscan
      artifacts: true
  before_script:
    - *install-tools     # also sources image.env so sbom-post sees ARTIFACTORY_*, etc.
  script:
    - . ./build.env
    - bash ./scripts/sbom-post.sh "${SBOM_FILE}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true

# ═══════════════════════════════════════════════════════════════════
# PROMOTE — REMOVED. Manual via Artifactory's native copy UI.
# ═══════════════════════════════════════════════════════════════════
# After validating the dev image, a human promotes to prod by either:
#   - Artifactory UI: Browse → <repo>/<image>/<tag> → "Copy" or "Move"
#   - CLI:  crane copy <dev-digest> <prod-registry>/<project>/<image>:<tag>
# Same digest preserved either way. See README "Promoting to production"
# for the exact crane invocation and required auth setup.
