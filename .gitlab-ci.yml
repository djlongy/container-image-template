# container-image-template — GitLab CI pipeline
#
# Single-image build and DevSecOps pipeline. Everything inline —
# no includes, no template indirection. Designed so a newcomer can
# read this one file and see the entire flow.
#
# Pipeline shape (5 stages, sign commented out, promote dropped):
#
#   prescan      → xray-vuln-prescan, xray-sbom-prescan
#                  (scan UPSTREAM_REF, fail-fast on policy violation
#                   if XRAY_FAIL_ON_SEVERITY is set + allow_failure
#                   flipped to false on xray-vuln-prescan)
#   build        → docker build + push to PUSH_REGISTRY
#   postscan     → xray-vuln-postscan, xray-sbom-postscan
#                  (scan the BUILT image — IMAGE_DIGEST from build.env)
#                  + sbom (Syft when approved), grype, grype-db-sync
#   sign         → cosign-sign (DORMANT — commented out)
#   ingest       → sbom-ingest (sbom-post.sh ships Syft SBOM)
#
#   (trivy block is present but commented out — uncomment when Trivy
#    is unbanned for business use. Xray covers vuln scan + SBOM in
#    the meantime; Grype reads the Syft SBOM when Syft is approved.)
#
# Variable precedence (canonical sources):
#   1. image.env (committed)  — non-secret per-fork canonical config
#   2. shell / CI env         — overrides image.env values for this run
#   3. CI variables           — for SECRETS only (passwords, tokens)
#
# Only these need to live as masked GitLab CI variables (everything
# else is in image.env, see README "Required CI variables — only
# secrets" for the rationale):
#
#   PUSH_REGISTRY_PASSWORD       — push secret for default backend
#   ARTIFACTORY_PASSWORD/TOKEN   — when REGISTRY_KIND=artifactory
#   XRAY_ARTIFACTORY_TOKEN       — when scan-side Artifactory differs
#   SPLUNK_HEC_TOKEN             — when shipping to Splunk
#   DEPENDENCY_TRACK_API_KEY     — when shipping to Dependency-Track
#   SBOM_WEBHOOK_AUTH_HEADER     — when generic webhook needs auth
#   COSIGN_KEY                   — when restoring the cosign-sign job
#
# Plus 3 CI-runtime images that YAML reads at pipeline-load time
# (these can't come from image.env): ALPINE_IMAGE, DOCKER_CLI_IMAGE,
# DOCKER_DIND_IMAGE. Their defaults work in a public-internet runner.
#
# Production promotion is INTENTIONALLY not in this pipeline — manual
# ritual via Artifactory's native copy UI. See README "Promoting to
# production" for the crane CLI invocation.

stages:
  - prescan      # Xray scan + SBOM of UPSTREAM_REF. Fails build on policy violation
  - build
  - postscan     # Xray scan + SBOM of the BUILT image (IMAGE_DIGEST), Syft SBOM, Grype
  - sign         # COMMENTED OUT — no cosign infra yet, restore when KMS/Vault transit lands
  - ingest
  # promote     # REMOVED — production promotion is a human ritual via Artifactory's
  #             # native copy UI (manual review + tag bump). See README "Promoting
  #             # to production" for the exact crane-copy command if you want CLI.

# ── Path gate ──────────────────────────────────────────────────────
# A pipeline only runs when something that actually affects the image
# changes. Editing README.md, LICENSE, renovate.json, bamboo-specs/,
# or .gitignore won't trigger a build. Tag pushes and FORCE_ALL=true
# bypass the gate for deliberate re-runs.
.build-changes: &build-changes
  - image.env
  - image.env.example
  - Dockerfile
  - scripts/**/*
  - certs/**/*
  - .gitlab-ci.yml

.build-rules: &build-rules
  - if: '$FORCE_ALL == "true"'
  - if: '$CI_COMMIT_TAG'
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    changes: *build-changes
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: *build-changes

# Pipeline-level gate. Without this, GitLab still creates an empty
# "container" pipeline when all jobs are filtered out by path rules,
# and marks it failed because there's nothing to run. workflow:rules:
# matches the build-rules above so pushes that touch no watched file
# produce no pipeline at all — not even an empty red one.
workflow:
  rules:
    - if: '$FORCE_ALL == "true"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *build-changes
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *build-changes

variables:
  # docker:dind TLS — disabled; matches internal GitLab runners that
  # don't mount /certs/client between dind service and job container.
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

  # ── Closed-network / air-gap configuration ──────────────────────
  # Every runtime dependency below can be overridden via CI variables
  # at group or project level. Defaults point at public sources so
  # fresh clones with internet access work out of the box. In a
  # closed network, override them to point at internal mirrors.
  #
  # 1) Docker images pulled by GitLab for the job containers.
  #    In a closed network, set these to your Artifactory proxy:
  #      DOCKER_CLI_IMAGE: dockerhub.artifactory.example.com/library/docker:27-cli
  #      DOCKER_DIND_IMAGE: dockerhub.artifactory.example.com/library/docker:27-dind
  #      ALPINE_IMAGE: dockerhub.artifactory.example.com/library/alpine:3.20
  DOCKER_CLI_IMAGE: "docker:27-cli"
  DOCKER_DIND_IMAGE: "docker:27-dind"
  ALPINE_IMAGE: "alpine:3.20"

  # 2) Tool binary download URLs. In most closed networks, GitHub
  #    releases are whitelisted so these defaults just work —
  #    Docker Hub is the common blocker, not github.com. Override
  #    here if your network also blocks GitHub and you've mirrored
  #    the binaries to an Artifactory generic repo.
  CRANE_URL: "https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz"
  SYFT_INSTALLER_URL: "https://raw.githubusercontent.com/anchore/syft/main/install.sh"
  SYFT_VERSION: "v1.14.0"
  GRYPE_INSTALLER_URL: "https://raw.githubusercontent.com/anchore/grype/main/install.sh"
  GRYPE_VERSION: "v0.82.0"
  COSIGN_URL: "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
  # JFrog CLI install — sudoless. Set ONE of the three URLs below to
  # point at a file in your local Artifactory. The public installer
  # path was removed because it required sudo to land in /usr/local/bin.
  # All three install into ${JF_INSTALL_DIR:-$HOME/.local/bin}.
  JF_BINARY_URL: ""   # direct binary, preferred
  JF_DEB_URL: ""      # .deb extracted with dpkg-deb -x (or ar/tar fallback)
  JF_RPM_URL: ""      # .rpm extracted with rpm2cpio | cpio
  JF_INSTALL_DIR: ""  # default: ${HOME}/.local/bin

  # ── Splunk HEC for Xray scan audit (xray-scan-post.sh) ──────────
  # Both URL + TOKEN must be set for the xray-audit job to ship JSON.
  # Keep SPLUNK_HEC_TOKEN as a masked group variable, never inline it.
  SPLUNK_HEC_URL: ""
  SPLUNK_HEC_INDEX: "main"
  SPLUNK_HEC_SOURCETYPE: "jfrog:xray:scan"
  SPLUNK_HEC_INSECURE: "false"

  # Verbose "why did this happen?" logging from build.sh. Set to
  # "true" via CI variable to debug image.env propagation, default
  # decisions, or tool install paths. Keep "false" in normal runs.
  BUILD_DEBUG: "false"
  # Grype vulnerability DB air-gap support:
  # When ARTIFACTORY_GRYPE_DB_REPO is set, the grype-db-sync job mirrors
  # the Anchore DB to that repo before the grype scan runs, and the scan
  # pulls from there instead of grype.anchore.io. Leave unset to let
  # grype fetch directly from Anchore's public CDN.
  ARTIFACTORY_GRYPE_DB_REPO: ""
  GRYPE_DB_MIRROR_SUBPATH: "grype-db/v6"

  # 3) Alpine package mirror. Replaces dl-cdn.alpinelinux.org in
  #    /etc/apk/repositories for every `apk add` / `apk upgrade` call
  #    in the pipeline (both CI-stage tool installs and the build's
  #    remediate stage). Set to your Artifactory/Nexus raw-proxy URL
  #    for dl-cdn.alpinelinux.org/alpine. Version paths (v3.20/main,
  #    v3.20/community, …) are preserved automatically.
  #      APK_MIRROR: https://nexus.example.com/repository/alpine-proxy
  APK_MIRROR: ""

  # 4) Debian / Ubuntu apt mirror. Used by the remediate stage inside
  #    the Dockerfile when DISTRO=debian or DISTRO=ubuntu — rewrites
  #    /etc/apt/sources.list* before apt-get update. Not needed for
  #    alpine bases. Example:
  #      APT_MIRROR: https://nexus.example.com/repository/ubuntu-proxy
  APT_MIRROR: ""

# ── Shared before_script: install tools used by most jobs ──────────
.install-tools: &install-tools
  - |
    # Apply the APK mirror rewrite before any apk command runs.
    if [ -n "${APK_MIRROR:-}" ]; then
      sed -i "s|https\?://dl-cdn.alpinelinux.org/alpine|${APK_MIRROR}|g" /etc/apk/repositories
    fi
  - apk add --no-cache bash git curl openssl jq python3   # python3 is for scripts/push-backends/artifactory.sh build-info-merge.py + JSON helpers
  - |
    # crane — used by build.sh for base digest + by promote for crane copy.
    # Install into $HOME/.local/bin (sudoless). PATH is exported here so
    # subsequent script: lines see it.
    mkdir -p "${HOME}/.local/bin"
    export PATH="${HOME}/.local/bin:${PATH}"
    if ! command -v crane >/dev/null 2>&1; then
      curl -sL "${CRANE_URL}" | tar xz -C "${HOME}/.local/bin/" crane
    fi
  - |
    # Source image.env via the SHARED LOADER (lib/load-image-env.sh)
    # so subsequent script: lines see PUSH_REGISTRY, ARTIFACTORY_*,
    # VENDOR, etc. with the SAME precedence semantics build.sh uses:
    #   shell / pipeline-trigger / CI vars   WIN
    #   image.env values                     LOSE if shell already set
    #
    # The earlier `set -a; . ./image.env; set +a` approach was wrong —
    # image.env unconditionally overrode shell vars, which broke
    # CI-variable overrides + pipeline-trigger variable overrides.
    # Pipeline 1931 caught this when an ARTIFACTORY_PUSH_HOST trigger
    # var was clobbered by image.env's value of the same key.
    #
    # load_image_env snapshots non-empty shell vars first, sources
    # image.env, then re-applies the snapshot so shell wins. Idempotent:
    # safe to call from install-tools AND from build.sh / scan scripts.
    if [ -f image.env ]; then
      # POSIX-sh snapshot/restore: GitLab's default shell is /bin/sh
      # (busybox in alpine images) which can't run our bash-only
      # load-image-env.sh (it uses ${!var}, <<<, <(...) — all bash 4+).
      # Implement the same shell-wins-over-file precedence in pure
      # POSIX so pipeline-trigger / CI vars override image.env values.
      #
      # Algorithm:
      #   1. Collect names of vars defined in image.env
      #   2. base64-encode currently-set non-empty values into a tmp file
      #   3. set -a; source image.env; set +a (auto-export all)
      #   4. Restore snapshot from tmp file (overrides image.env values)
      #
      # base64 is used to safely round-trip values containing single
      # quotes, newlines, $-substitutions, etc. without shell-injection.
      _IMG_KEYS=$(grep -oE '^[A-Z_][A-Z0-9_]*=' image.env | sed 's/=$//' | sort -u)
      _IMG_SNAP=$(mktemp)
      for k in $_IMG_KEYS; do
        eval "_v=\"\${${k}:-}\""
        if [ -n "${_v}" ]; then
          printf '%s=%s\n' "${k}" "$(printf '%s' "${_v}" | base64 | tr -d '\n')" >> "${_IMG_SNAP}"
        fi
      done
      set -a; . ./image.env; set +a
      while IFS='=' read -r _rk _rv; do
        _rdec=$(printf '%s' "${_rv}" | base64 -d)
        eval "${_rk}=\"\${_rdec}\""
        export "${_rk}"
      done < "${_IMG_SNAP}"
      rm -f "${_IMG_SNAP}"
      unset _IMG_KEYS _IMG_SNAP _v _rk _rv _rdec
    fi

# ═══════════════════════════════════════════════════════════════════
# BUILD
# ═══════════════════════════════════════════════════════════════════
build:
  stage: build
  image: ${DOCKER_CLI_IMAGE}
  services:
    - name: ${DOCKER_DIND_IMAGE}
      alias: docker
  before_script:
    - *install-tools
  script:
    # build.sh now handles its own docker login (after sourcing
    # image.env so creds can come from there). For the Artifactory
    # backend, jf is installed via scripts/lib/install-jf.sh which
    # build.sh's artifactory backend sources on demand.
    - bash ./scripts/build.sh --push
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules: *build-rules

# ═══════════════════════════════════════════════════════════════════
# SCAN — SBOM generation
# ═══════════════════════════════════════════════════════════════════
# Syft generates the CycloneDX SBOM from the pushed image digest.
# This is the single source of truth for the rest of the pipeline:
# Grype consumes it, cosign attests it, sbom-post.sh ships it.
sbom:
  stage: postscan
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
  before_script:
    - *install-tools
    - |
      mkdir -p "${HOME}/.local/bin"
      export PATH="${HOME}/.local/bin:${PATH}"
      if ! command -v syft >/dev/null 2>&1; then
        curl -sSfL "${SYFT_INSTALLER_URL}" | sh -s -- -b "${HOME}/.local/bin" "${SYFT_VERSION}"
      fi
      syft version
  script:
    # Log in so syft can pull the image manifest by digest.
    - |
      # Write a config.json that covers BOTH Harbor and (optionally)
      # Artifactory. Downstream tools (syft, cosign) use this to
      # authenticate image pulls regardless of which backend the build
      # stage pushed to. Order doesn't matter — each host key points
      # to a separate auth entry.
      mkdir -p ~/.docker
      AUTHS=""
      if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ]; then
        A=$(printf '%s' "${PUSH_REGISTRY_USER}:${PUSH_REGISTRY_PASSWORD}" | base64 -w0)
        AUTHS="${AUTHS}\"${PUSH_REGISTRY}\":{\"auth\":\"${A}\"},"
      fi
      if [ "${REGISTRY_KIND:-}" = "artifactory" ] && [ -n "${ARTIFACTORY_USER:-}" ]; then
        ART_SECRET="${ARTIFACTORY_TOKEN:-${ARTIFACTORY_PASSWORD:-}}"
        ART_HOST="${ARTIFACTORY_PUSH_HOST:-}"
        if [ -z "${ART_HOST}" ] && [ -n "${ARTIFACTORY_URL:-}" ]; then
          ART_HOST="${ARTIFACTORY_URL#https://}"
          ART_HOST="${ART_HOST#http://}"
          ART_HOST="${ART_HOST%%/*}"
        fi
        if [ -n "${ART_HOST}" ] && [ -n "${ART_SECRET}" ]; then
          A=$(printf '%s' "${ARTIFACTORY_USER}:${ART_SECRET}" | base64 -w0)
          AUTHS="${AUTHS}\"${ART_HOST}\":{\"auth\":\"${A}\"},"
        fi
      fi
      AUTHS="${AUTHS%,}"
      printf '{"auths":{%s}}\n' "${AUTHS}" > ~/.docker/config.json
    - |
      echo "→ Generating SBOM for ${IMAGE_DIGEST:-${IMAGE_REF}}"
      SCAN_TARGET="${IMAGE_DIGEST:-${IMAGE_REF}}"
      syft "${SCAN_TARGET}" \
        -o cyclonedx-json=sbom.cdx.json \
        -o spdx-json=sbom.spdx.json \
        -o syft-json=sbom.syft.json
      echo "→ SBOM generated:"
      ls -la sbom.*.json
      # Quick component count for the pipeline log
      if command -v jq >/dev/null 2>&1; then
        echo "  components: $(jq '.components | length' sbom.cdx.json)"
      fi
  artifacts:
    paths:
      - sbom.cdx.json
      - sbom.spdx.json
      - sbom.syft.json
    reports:
      cyclonedx: sbom.cdx.json
    expire_in: 1 month
  rules: *build-rules

# ═══════════════════════════════════════════════════════════════════
# SCAN — grype DB mirror (optional, for air-gapped environments)
# ═══════════════════════════════════════════════════════════════════
# Mirrors the Anchore Grype CVE database to an Artifactory generic
# repo so the grype job can fetch it without reaching grype.anchore.io.
# Only runs when ARTIFACTORY_GRYPE_DB_REPO is set — skipped otherwise,
# in which case grype downloads directly from Anchore's public CDN.
grype-db-sync:
  stage: postscan
  image: ${ALPINE_IMAGE}
  needs: []
  rules:
    - if: '$ARTIFACTORY_GRYPE_DB_REPO != "" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$ARTIFACTORY_GRYPE_DB_REPO != "" && $CI_PIPELINE_SOURCE == "schedule"'
    - when: never
  before_script:
    - *install-tools
  script:
    - ./scripts/mirror-grype-db.sh

# ═══════════════════════════════════════════════════════════════════
# SCAN — vulnerability scanning (Grype, SBOM-first)
# ═══════════════════════════════════════════════════════════════════
# Grype reads the CycloneDX SBOM directly (no image re-pull) and
# matches components against its vulnerability database. This is the
# replacement for Trivy while Trivy is banned for business use.
#
# Air-gap: when ARTIFACTORY_GRYPE_DB_REPO is set, the grype-db-sync
# job populates the mirror and this job fetches the DB from there
# instead of from grype.anchore.io.
grype:
  stage: postscan
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
    - job: sbom
      artifacts: true
    - job: grype-db-sync
      optional: true
  before_script:
    - *install-tools
    - |
      mkdir -p "${HOME}/.local/bin"
      export PATH="${HOME}/.local/bin:${PATH}"
      if ! command -v grype >/dev/null 2>&1; then
        curl -sSfL "${GRYPE_INSTALLER_URL}" | sh -s -- -b "${HOME}/.local/bin" "${GRYPE_VERSION}"
      fi
      grype version
    # When a mirror repo is configured, point Grype at it. Credentials
    # are embedded in the URL so Grype's DB client (which doesn't
    # support Basic auth headers natively) can authenticate.
    - |
      if [ -n "${ARTIFACTORY_GRYPE_DB_REPO:-}" ] && [ -n "${ARTIFACTORY_URL:-}" ]; then
        _art_host="${ARTIFACTORY_URL#https://}"
        _art_host="${_art_host#http://}"
        _art_host="${_art_host%%/*}"
        _art_secret="${ARTIFACTORY_TOKEN:-${ARTIFACTORY_PASSWORD:-}}"
        export GRYPE_DB_UPDATE_URL="https://${ARTIFACTORY_USER}:${_art_secret}@${_art_host}/artifactory/${ARTIFACTORY_GRYPE_DB_REPO}/${GRYPE_DB_MIRROR_SUBPATH}/latest.json"
        export GRYPE_DB_AUTO_UPDATE=true
        echo "→ Grype DB source: ${ARTIFACTORY_URL}/artifactory/${ARTIFACTORY_GRYPE_DB_REPO}/${GRYPE_DB_MIRROR_SUBPATH}/latest.json"
      fi
  script:
    - |
      echo "→ Scanning SBOM for vulnerabilities (Grype)"
      # Full JSON for downstream ingestion / cosign attestation
      grype sbom:sbom.cdx.json \
        --output json \
        --file grype-report.json \
        --fail-on "" \
        || true
      # Human-readable table for the pipeline log
      grype sbom:sbom.cdx.json --output table || true

      # Count by severity for the log summary
      if command -v jq >/dev/null 2>&1; then
        echo ""
        echo "→ Vulnerability summary:"
        for sev in Critical High Medium Low Negligible Unknown; do
          count=$(jq "[.matches[] | select(.vulnerability.severity==\"${sev}\")] | length" grype-report.json)
          echo "    ${sev}: ${count}"
        done
      fi

      # Gate: fail the pipeline on new Critical CVEs (tune as needed).
      # Uncomment when you want the gate to actually block:
      #
      # CRIT=$(jq '[.matches[] | select(.vulnerability.severity=="Critical")] | length' grype-report.json)
      # if [ "${CRIT}" -gt 0 ]; then
      #   echo "ERROR: ${CRIT} critical vulnerabilities found" >&2
      #   exit 1
      # fi
  artifacts:
    paths:
      - grype-report.json
    expire_in: 1 month
  rules: *build-rules

# ═══════════════════════════════════════════════════════════════════
# PRESCAN — Xray on UPSTREAM_REF, gated, BEFORE build runs
# ═══════════════════════════════════════════════════════════════════
# Two paired jobs that scan the upstream image we're about to rebuild.
# They run in the prescan stage so a critical CVE in the upstream
# fails the pipeline BEFORE the build job wastes runner time. Set
# XRAY_FAIL_ON_SEVERITY in image.env (or as a pipeline-trigger var)
# to enforce a real gate; leave unset for audit-only mode.
#
# Both jobs pass UPSTREAM_REF explicitly via XRAY_SCAN_REF (positional
# arg would also work) so the script's resolution chain doesn't fall
# back to IMAGE_DIGEST (which doesn't exist yet — build hasn't run).
.xray-anchor: &xray-anchor
  image: ${DOCKER_CLI_IMAGE}
  services:
    - name: ${DOCKER_DIND_IMAGE}
      alias: docker
  variables:
    # Move jf's home dir INTO the project dir so GitLab CI cache can
    # persist it across job runs. Default ~/.jfrog is outside the
    # project tree and not cacheable. Without this, every xray job
    # re-downloads the Xray Analyzer Manager (~300MB) — across 4 xray
    # jobs per pipeline that's 1.2 GB of redundant downloads and was
    # the root cause of pipeline 1926's "no space left on device".
    JFROG_CLI_HOME_DIR: "${CI_PROJECT_DIR}/.jfrog-cli-home"
  cache:
    # Static key shared across all branches + pipelines so the analyzer
    # downloaded by the first xray job of the day is reused by every
    # subsequent xray job. Bump the suffix when you upgrade JF_BINARY_URL
    # (jf CLI version) so the cache invalidates and grabs a matching
    # analyzer for the new CLI.
    key: jfrog-deps-cache-v1
    paths:
      - .jfrog-cli-home/dependencies/
    policy: pull-push    # download cache first, upload changes after
  before_script:
    - *install-tools
  rules: *build-rules
  # JFrog Cloud trial / shared-instance Xray hates concurrent scans
  # (we hung at 10+ minutes when two ran in parallel against the
  # trial). resource_group serialises ALL xray jobs across ALL
  # pipelines on this project. Drop it when you've moved to a Pro /
  # self-hosted Xray with real concurrency.
  resource_group: xray-scan
  # POLICY-GATE NOTE: when XRAY_FAIL_ON_SEVERITY is set in image.env
  # the script exits 2 on violation. To make THAT a real gate (not a
  # warning), set allow_failure: false on xray-vuln-prescan only —
  # then a critical CVE in the upstream blocks build. Postscan jobs
  # stay allow_failure: true (audit shipping is non-blocking).
  allow_failure: true

xray-vuln-prescan:
  <<: *xray-anchor
  stage: prescan
  needs: []      # no need for build artifacts — scans UPSTREAM_REF
  script:
    - |
      # Use the assembled UPSTREAM_REF derived from image.env's
      # UPSTREAM_REGISTRY/IMAGE/TAG. Bypasses the script's IMAGE_DIGEST
      # default (which would be empty here anyway since build hasn't run).
      export XRAY_SCAN_REF="${UPSTREAM_REGISTRY}/${UPSTREAM_IMAGE}:${UPSTREAM_TAG}"
      bash ./scripts/scan/xray-vuln.sh
  artifacts:
    paths:
      - xray-scan.json
    expire_in: 1 month
    when: always

xray-sbom-prescan:
  <<: *xray-anchor
  stage: prescan
  needs: []
  script:
    - |
      export XRAY_SCAN_REF="${UPSTREAM_REGISTRY}/${UPSTREAM_IMAGE}:${UPSTREAM_TAG}"
      bash ./scripts/scan/xray-sbom.sh
  artifacts:
    paths:
      - xray-sbom.cdx.json
    expire_in: 1 month
    when: always

# ═══════════════════════════════════════════════════════════════════
# POSTSCAN — Xray on the BUILT image (IMAGE_DIGEST), audit ingestion
# ═══════════════════════════════════════════════════════════════════
# Runs AFTER build. Scans what consumers will actually pull, including
# remediation / cert injection / scripts/extend/ customisations. The
# scripts default to scanning IMAGE_DIGEST (from build.env via dotenv
# artifact import), so no XRAY_SCAN_REF override needed.
xray-vuln-postscan:
  <<: *xray-anchor
  stage: postscan
  needs:
    - job: build
      artifacts: true
  script:
    - bash ./scripts/scan/xray-vuln.sh
  artifacts:
    paths:
      - xray-scan.json
    expire_in: 1 month
    when: always

xray-sbom-postscan:
  <<: *xray-anchor
  stage: postscan
  needs:
    - job: build
      artifacts: true
  script:
    - bash ./scripts/scan/xray-sbom.sh
  artifacts:
    paths:
      - xray-sbom.cdx.json
    expire_in: 1 month
    when: always

