# ═══════════════════════════════════════════════════════════════════
# SIGN — cosign sign + SBOM attestation
# ═══════════════════════════════════════════════════════════════════
# Signs the image by digest (tag reassignment can't invalidate the
# signature) and attests the CycloneDX SBOM + Grype report as
# predicates, so downstream consumers can verify both provenance
# AND scanned state at any time via `cosign verify-attestation`.
cosign-sign:
  stage: sign
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
    - job: sbom
      artifacts: true
    - job: grype
      artifacts: true
  before_script:
    - *install-tools
    - |
      if ! command -v cosign >/dev/null 2>&1; then
        curl -sL "${COSIGN_URL}" -o /usr/local/bin/cosign
        chmod +x /usr/local/bin/cosign
      fi
      cosign version
  script:
    - |
      if [ -z "${COSIGN_KEY:-}" ]; then
        echo "SKIPPED: COSIGN_KEY not set — image will be unsigned"
        echo "  Set COSIGN_KEY as a CI variable (file: type preferred) to enable signing"
        exit 0
      fi
    - |
      # Write a config.json that covers BOTH Harbor and (optionally)
      # Artifactory. Downstream tools (syft, cosign) use this to
      # authenticate image pulls regardless of which backend the build
      # stage pushed to. Order doesn't matter — each host key points
      # to a separate auth entry.
      mkdir -p ~/.docker
      AUTHS=""
      if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ]; then
        A=$(printf '%s' "${PUSH_REGISTRY_USER}:${PUSH_REGISTRY_PASSWORD}" | base64 -w0)
        AUTHS="${AUTHS}\"${PUSH_REGISTRY}\":{\"auth\":\"${A}\"},"
      fi
      if [ "${REGISTRY_KIND:-}" = "artifactory" ] && [ -n "${ARTIFACTORY_USER:-}" ]; then
        ART_SECRET="${ARTIFACTORY_TOKEN:-${ARTIFACTORY_PASSWORD:-}}"
        ART_HOST="${ARTIFACTORY_PUSH_HOST:-}"
        if [ -z "${ART_HOST}" ] && [ -n "${ARTIFACTORY_URL:-}" ]; then
          ART_HOST="${ARTIFACTORY_URL#https://}"
          ART_HOST="${ART_HOST#http://}"
          ART_HOST="${ART_HOST%%/*}"
        fi
        if [ -n "${ART_HOST}" ] && [ -n "${ART_SECRET}" ]; then
          A=$(printf '%s' "${ARTIFACTORY_USER}:${ART_SECRET}" | base64 -w0)
          AUTHS="${AUTHS}\"${ART_HOST}\":{\"auth\":\"${A}\"},"
        fi
      fi
      AUTHS="${AUTHS%,}"
      printf '{"auths":{%s}}\n' "${AUTHS}" > ~/.docker/config.json
    - |
      TARGET="${IMAGE_DIGEST:-${IMAGE_REF}}"
      echo "→ cosign sign ${TARGET}"
      cosign sign --key "${COSIGN_KEY}" --yes --tlog-upload=false \
        -a "ci.build=${CI_JOB_ID}" \
        -a "ci.pipeline=${CI_PIPELINE_ID}" \
        -a "git.commit=${CI_COMMIT_SHA}" \
        "${TARGET}"

      if [ -f sbom.cdx.json ]; then
        echo "→ cosign attest (CycloneDX SBOM)"
        cosign attest --key "${COSIGN_KEY}" --yes --tlog-upload=false \
          --type cyclonedx --predicate sbom.cdx.json "${TARGET}"
      fi

      if [ -f grype-report.json ]; then
        echo "→ cosign attest (Grype vulnerability report)"
        cosign attest --key "${COSIGN_KEY}" --yes --tlog-upload=false \
          --type vuln --predicate grype-report.json "${TARGET}"
      fi
  rules:
    - if: '$FORCE_ALL == "true"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *build-changes

# ═══════════════════════════════════════════════════════════════════
# INGEST — post SBOM to configured sinks
# ═══════════════════════════════════════════════════════════════════
# Runs scripts/sbom-post.sh which ships the CycloneDX JSON to whatever
# sink is configured (generic webhook or OWASP Dependency-Track).
# No-op if no sink env vars are set — safe to leave enabled even
# before the business picks an SBOM platform.
sbom-ingest:
  stage: ingest
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
    - job: sbom
      artifacts: true
  before_script:
    - |
      if [ -n "${APK_MIRROR:-}" ]; then
        sed -i "s|https\?://dl-cdn.alpinelinux.org/alpine|${APK_MIRROR}|g" /etc/apk/repositories
      fi
    - apk add --no-cache bash curl jq
  script:
    - bash ./scripts/sbom-post.sh sbom.cdx.json
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true

# ═══════════════════════════════════════════════════════════════════
# PROMOTE — crane copy to production registry (manual)
# ═══════════════════════════════════════════════════════════════════
# Byte-for-byte identical promotion using `crane copy`. No rebuild,
# same digest. Gated behind ENABLE_PROD_PROMOTE=true so fresh clones
# without a prod registry don't show a red manual gate.
promote-prod:
  stage: promote
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
  before_script:
    - *install-tools
  script:
    - |
      if [ -z "${PROD_PUSH_REGISTRY:-}" ]; then
        echo "ERROR: PROD_PUSH_REGISTRY not set" >&2
        exit 1
      fi
      if [ -z "${IMAGE_DIGEST:-}" ]; then
        echo "ERROR: IMAGE_DIGEST not available from build stage" >&2
        exit 1
      fi
    - |
      if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ]; then
        crane auth login "${PUSH_REGISTRY}" -u "${PUSH_REGISTRY_USER}" -p "${PUSH_REGISTRY_PASSWORD}"
      fi
      if [ -n "${PROD_PUSH_REGISTRY_USER:-}" ] && [ -n "${PROD_PUSH_REGISTRY_PASSWORD:-}" ]; then
        crane auth login "${PROD_PUSH_REGISTRY}" -u "${PROD_PUSH_REGISTRY_USER}" -p "${PROD_PUSH_REGISTRY_PASSWORD}"
      fi
    - |
      DEST_PROJECT="${PROD_PUSH_PROJECT:-${PUSH_PROJECT}}"
      DST="${PROD_PUSH_REGISTRY}/${DEST_PROJECT}/${IMAGE_NAME}:${IMAGE_TAG}"
      echo "→ crane copy ${IMAGE_DIGEST} → ${DST}"
      crane copy "${IMAGE_DIGEST}" "${DST}"
      echo "→ promoted"
      echo "  source digest: $(crane digest ${IMAGE_DIGEST})"
      echo "  dest digest:   $(crane digest ${DST})"
  rules:
    - if: '$ENABLE_PROD_PROMOTE != "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *build-changes
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true
    - if: '$FORCE_ALL == "true"'
      when: manual
      allow_failure: true
