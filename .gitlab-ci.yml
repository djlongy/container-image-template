#   before_script:
#     - *install-tools
#   script:
#     - |
#       export TRIVY_SCAN_REF="${UPSTREAM_REGISTRY}/${UPSTREAM_IMAGE}:${UPSTREAM_TAG}"
#       bash ./scripts/scan/trivy-sbom.sh
#   artifacts:
#     paths:
#       - sbom.cdx.json
#     expire_in: 1 month
#     when: always
#   rules: *build-rules
