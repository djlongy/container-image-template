# ═══════════════════════════════════════════════════════════════════
# SIGN — cosign sign + SBOM attestation  (DORMANT — no cosign infra at work yet)
# ═══════════════════════════════════════════════════════════════════
# Restore by uncommenting the block below AND configuring COSIGN_KEY
# as a file-type CI variable (Vault transit / KMS reference preferred
# over a raw private key). Until then the `sign` stage in `stages:`
# above has no jobs and is silently skipped.
#
# Signs the image by digest (tag reassignment can't invalidate the
# signature) and attests the CycloneDX SBOM + Grype report as
# predicates, so downstream consumers can verify both provenance
# AND scanned state via `cosign verify-attestation`.
#
# cosign-sign:
#   stage: sign
#   image: ${ALPINE_IMAGE}
#   needs:
#     - job: build
#       artifacts: true
#     - job: sbom
#       artifacts: true
#     - job: grype
#       artifacts: true
#   before_script:
