# ═══════════════════════════════════════════════════════════════════
# SIGN — cosign sign + SBOM attestation
# ═══════════════════════════════════════════════════════════════════
cosign-sign:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: sbom
            destination: .
          - name: grype-report
            destination: .
    - script:
        interpreter: /bin/bash
        description: Cosign sign + attest SBOM + attest vulns
        body: |
          set -euo pipefail
          . ./build.env

          for var in PUSH_REGISTRY_USER PUSH_REGISTRY_PASSWORD PUSH_REGISTRY COSIGN_KEY; do
            bv="bamboo_${var}"
            eval "val=\${${bv}:-}"
            [ -n "${val}" ] && export "${var}=${val}"
          done

          if [ -z "${COSIGN_KEY:-}" ]; then
            echo "SKIPPED: COSIGN_KEY not set"
            exit 0
          fi

          if ! command -v cosign >/dev/null 2>&1; then
            curl -sL "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64" \
              -o "${HOME}/.local/bin/cosign"
            chmod +x "${HOME}/.local/bin/cosign"
            export PATH="${HOME}/.local/bin:${PATH}"
          fi

          if [ -n "${PUSH_REGISTRY_USER:-}" ]; then
            echo "${PUSH_REGISTRY_PASSWORD}" | docker login "${PUSH_REGISTRY}" \
              -u "${PUSH_REGISTRY_USER}" --password-stdin
          fi

          TARGET="${IMAGE_DIGEST:-${IMAGE_REF}}"
          cosign sign --key "${COSIGN_KEY}" --yes --tlog-upload=false \
            -a "ci.build=${bamboo_buildResultKey}" \
            -a "ci.plan=${bamboo_planKey}" \
            -a "git.commit=${GIT_SHA}" \
            "${TARGET}"

          if [ -f sbom.cdx.json ]; then
            cosign attest --key "${COSIGN_KEY}" --yes --tlog-upload=false \
              --type cyclonedx --predicate sbom.cdx.json "${TARGET}"
          fi
          if [ -f grype-report.json ]; then
            cosign attest --key "${COSIGN_KEY}" --yes --tlog-upload=false \
              --type vuln --predicate grype-report.json "${TARGET}"
          fi
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# INGEST — SBOM post to configured sinks
# ═══════════════════════════════════════════════════════════════════
sbom-ingest:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: sbom
            destination: .
    - script:
        interpreter: /bin/bash
        description: Post SBOM to configured sinks
        body: |
          set -euo pipefail
          for var in SBOM_WEBHOOK_URL SBOM_WEBHOOK_AUTH_HEADER \
                     DEPENDENCY_TRACK_URL DEPENDENCY_TRACK_API_KEY DEPENDENCY_TRACK_PROJECT \
                     ARTIFACTORY_URL ARTIFACTORY_USER ARTIFACTORY_PASSWORD ARTIFACTORY_TOKEN \
                     ARTIFACTORY_SBOM_REPO; do
            bv="bamboo_${var}"
            eval "val=\${${bv}:-}"
            [ -n "${val}" ] && export "${var}=${val}"
          done
          bash ./scripts/sbom-post.sh sbom.cdx.json
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# PROMOTE — crane copy to production (manual)
# ═══════════════════════════════════════════════════════════════════
promote-prod:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: /bin/bash
        description: Promote built image to production registry
        body: |
          set -euo pipefail
          . ./build.env

          for var in PUSH_REGISTRY PUSH_REGISTRY_USER PUSH_REGISTRY_PASSWORD \
                     PROD_PUSH_REGISTRY PROD_PUSH_PROJECT \
                     PROD_PUSH_REGISTRY_USER PROD_PUSH_REGISTRY_PASSWORD; do
            bv="bamboo_${var}"
            eval "val=\${${bv}:-}"
            [ -n "${val}" ] && export "${var}=${val}"
          done

          if [ -z "${PROD_PUSH_REGISTRY:-}" ] || [ -z "${IMAGE_DIGEST:-}" ]; then
            echo "ERROR: need PROD_PUSH_REGISTRY and IMAGE_DIGEST" >&2
            exit 1
          fi

          if ! command -v crane >/dev/null 2>&1; then
            curl -sL "https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz" \
              | tar xz -C "${HOME}/.local/bin/" crane
            export PATH="${HOME}/.local/bin:${PATH}"
          fi

          [ -n "${PUSH_REGISTRY_USER:-}" ] && \
            crane auth login "${PUSH_REGISTRY}" -u "${PUSH_REGISTRY_USER}" -p "${PUSH_REGISTRY_PASSWORD}"
          [ -n "${PROD_PUSH_REGISTRY_USER:-}" ] && \
            crane auth login "${PROD_PUSH_REGISTRY}" -u "${PROD_PUSH_REGISTRY_USER}" -p "${PROD_PUSH_REGISTRY_PASSWORD}"

          DEST_PROJECT="${PROD_PUSH_PROJECT:-${PUSH_PROJECT}}"
          DST="${PROD_PUSH_REGISTRY}/${DEST_PROJECT}/${IMAGE_NAME}:${IMAGE_TAG}"
          crane copy "${IMAGE_DIGEST}" "${DST}"
          echo "Promoted: ${DST}"
  requirements:
    - system.docker.executable
