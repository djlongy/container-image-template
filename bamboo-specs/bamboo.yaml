# container-image-template — Bamboo plan spec
#
# Atlassian YAML Specs v2 (NOT the reecetech custom dialect — that
# uses `type: SCRIPT` + `body: |`, this uses `script:` + `scripts: -`).
#
# 1:1 parity with .gitlab-ci.yml. Same stages, same scripts/build.sh
# entry point, same SBOM → Grype → Cosign → Xray-audit → Ingest →
# Promote flow. Runs on a Bamboo agent with docker installed
# (system.docker.executable capability) — no dind dance needed.
#
# ── HOW PLAN VARIABLES FLOW INTO build.sh ────────────────────────────
#
# Bamboo exposes plan variables and System → Global variables to
# script tasks as env vars with a `bamboo_` prefix (dots in the var
# name become underscores). build.sh now auto-imports every `bamboo_*`
# env var as the bare name BEFORE sourcing image.env, so a plan var
# named `INJECT_CERTS` automatically becomes `INJECT_CERTS` for the script.
#
# That auto-import only handles exact-name matches. For globally
# shared service-account vars whose Bamboo names DON'T match what
# build.sh expects (e.g. global `svc_artifactory_token` vs script's
# `ARTIFACTORY_TOKEN`), add a one-line export shim in the task script
# BEFORE invoking build.sh — see the Build job below for the pattern.
#
# Keep secrets in plan vars (encrypted), keep behavioural toggles in
# image.env (committed, in repo). Don't commit secrets to image.env.
#
# ── REQUIRED / OPTIONAL plan or global variables ─────────────────────
#
# Push backend selector (drives which scripts/push-backends/<kind>.sh runs):
#   REGISTRY_KIND           "harbor" (default) | "artifactory"
#
# When REGISTRY_KIND="harbor" — set ONLY HARBOR_* (ARTIFACTORY_* ignored):
#   HARBOR_REGISTRY         destination registry host
#   HARBOR_PROJECT          destination project / path prefix
#   HARBOR_USER             registry push username
#   HARBOR_PASSWORD         registry push password (masked)
#
# When REGISTRY_KIND="artifactory" — set ONLY ARTIFACTORY_* (HARBOR_* ignored):
#   ARTIFACTORY_URL         REST URL (https:// scheme required)
#   ARTIFACTORY_USER        service-account username (NOT email — see image.env)
#   ARTIFACTORY_TOKEN       OR ARTIFACTORY_PASSWORD (token preferred, masked)
#   ARTIFACTORY_TEAM        team key for layout templates
#   ARTIFACTORY_PRO         "true" to enable Pro-tier features (default false)
#   ARTIFACTORY_PROJECT     project key (defaults to ARTIFACTORY_TEAM)
#   ARTIFACTORY_ENVIRONMENT "dev" | "prod"
#   ARTIFACTORY_PUSH_HOST   override host for subdomain layouts
#   ARTIFACTORY_IMAGE_REF   layout template for docker push URL
#   ARTIFACTORY_MANIFEST_PATH  layout template for REST storage path
#
# Severity gates (opt-in — exit 2 on matching CVEs, blocking the job):
#   XRAY_FAIL_ON_SEVERITY      e.g. "critical" | "critical,high"
#   GRYPE_FAIL_ON_SEVERITY     e.g. "Critical" | "Critical,High"
#   TRIVY_FAIL_ON_SEVERITY     e.g. "CRITICAL" | "CRITICAL,HIGH"  (DORMANT)
#   ARTIFACTORY_BUILD_XRAY_PRESCAN   "true" → in-build Xray pre-push scan
#   ARTIFACTORY_BUILD_XRAY_POSTSCAN  "true" → in-build Xray post-push scan
#   ARTIFACTORY_XRAY_FAIL_ON_VIOLATIONS  "true" → fail-on policy violation
#
# Scan-side Artifactory override (when push-side and scan-side differ —
# e.g. push to JCR Free, scan via separate Pro/Cloud trial):
#   XRAY_ARTIFACTORY_URL    REST URL of the Xray-licensed instance
#   XRAY_ARTIFACTORY_USER
#   XRAY_ARTIFACTORY_TOKEN  OR XRAY_ARTIFACTORY_PASSWORD
#
# Canonical artifact filenames (defaults from scripts/lib/artifact-names.sh
# — almost never need to override):
#   SBOM_FILE               default "sbom.cdx.json"
#   VULN_SCAN_FILE          default "vuln-scan.json"
#
# SBOM sinks (sbom-post.sh — set whichever sinks apply, all opt-in):
#   SBOM_WEBHOOK_URL              generic CycloneDX webhook endpoint
#   SBOM_WEBHOOK_AUTH_HEADER      auth header for the webhook (masked)
#   DEPENDENCY_TRACK_URL          OWASP Dependency-Track base URL
#   DEPENDENCY_TRACK_API_KEY      DT BOM-upload API key (masked)
#   DEPENDENCY_TRACK_PROJECT      DT project name
#   ARTIFACTORY_SBOM_REPO         Xray-indexed generic repo (auto-scans on upload)
#   ARTIFACTORY_SBOM_ARCHIVE_REPO plain generic repo (long-term archive)
#   SPLUNK_HEC_URL                Splunk HEC endpoint
#   SPLUNK_HEC_TOKEN              HEC token (masked, preferably via svc_* shim)
#   SPLUNK_HEC_INDEX              default "main"
#   SPLUNK_HEC_SOURCETYPE         default "jfrog:xray:scan"
#   SPLUNK_HEC_INSECURE           "true" → curl -k for self-signed Splunk
#   SPLUNK_SOURCE                 envelope source prefix (default "pipeline")
#
# Cosign signing (DORMANT — restore the Cosign Sign job to enable):
#   COSIGN_KEY               private key path or env: reference (file: type)
#   COSIGN_URL               cosign binary URL (air-gap mirror)
#
# Corp CA (auto-flips INJECT_CERTS=true inside build.sh):
#   CA_CERT                  PEM content of a corp CA
#
# Closed-network tool mirrors (defaults reach public GitHub releases —
# override when the agent has no outbound internet):
#   CRANE_URL                go-containerregistry tarball URL
#   SYFT_INSTALLER_URL       Syft install.sh URL
#   GRYPE_INSTALLER_URL      Grype install.sh URL
#   TRIVY_INSTALLER_URL      Trivy install.sh URL  (DORMANT)
#   TRIVY_BINARY_URL         direct trivy tarball URL (DORMANT)
#   JF_BINARY_URL            direct jf binary URL (preferred)
#   JF_DEB_URL               .deb pkg URL (extracted, no dpkg -i)
#   JF_RPM_URL               .rpm pkg URL (extracted, no rpm -i)
#
# Shared service-account globals (renamed via shim because the script
# expects a different name — see Build / scan job preludes):
#   svc_artifactory_token    → exported as ARTIFACTORY_TOKEN
#   svc_artifactory_user     → exported as ARTIFACTORY_USER
#   svc_harbor_user          → exported as HARBOR_USER
#   svc_harbor_password      → exported as HARBOR_PASSWORD
#   svc_splunk_hec_token     → exported as SPLUNK_HEC_TOKEN
#   svc_dependency_track_api_key → exported as DEPENDENCY_TRACK_API_KEY
#   svc_sbom_webhook_auth_header → exported as SBOM_WEBHOOK_AUTH_HEADER
#
# Production promotion is INTENTIONALLY not in this pipeline — human
# ritual via Artifactory's native copy UI. See README "Promoting to
# production" for the manual command.
#
# image.env (committed) is the single source of truth for build
# behaviour (INJECT_CERTS, REGISTRY_KIND, UPSTREAM_*, Artifactory
# layout templates, etc.). Plan vars only carry secrets and
# per-environment overrides.
#
# ── ENABLING BUILD_DEBUG ─────────────────────────────────────────────
# Add a plan variable named `BUILD_DEBUG` with value `true` to get
# verbose "why did this decision happen?" logging from build.sh in
# the Bamboo log. Auto-imported by build.sh — no shim needed.

---
version: 2

plan:
  project-key: DEVOPS
  key: CIT
  name: Container Image Template
  description: |-
    Builds, scans, signs, and promotes a single container image
    based on the upstream pinned in image.env. Pipeline mirrors
    .gitlab-ci.yml stage-for-stage.

# Polling: integer = seconds. Bamboo polls the linked repository at
# this interval and triggers the plan on detected changes. The linked
# repository is the one this bamboo-specs/ file lives in (added at
# plan creation in the Bamboo UI), so no `repositories:` block needed.
triggers:
  - polling: 60

stages:
  - Prescan:
      jobs:
        - Xray Vuln Prescan
        - Xray SBOM Prescan
        - Syft SBOM Prescan
        # - Trivy Vuln Prescan   # DORMANT — Trivy banned for business
        # - Trivy SBOM Prescan   #   use. Uncomment BOTH entries here
        #                        #   AND the job blocks further down.
  - Build:
      jobs:
        - Build
  - Postscan:
      jobs:
        - Syft SBOM Postscan
        - Xray SBOM Postscan
        - Xray Vuln Postscan
        - Grype Vuln
        # - Trivy Vuln Postscan   # DORMANT — same caveat as Prescan
        # - Trivy SBOM Postscan   #   variants above.
  # - Sign:           # COMMENTED OUT — no cosign infra at work yet.
  #     jobs:        # Restore by uncommenting both this stage and the
  #       - Cosign Sign  # `Cosign Sign:` job block further down.
  - Ingest:
      jobs:
        - SBOM Ingest
  # - Promote:        # REMOVED — production promotion is a human ritual
  #     manual: true  # via Artifactory's native copy UI. See README
  #     jobs:         # "Promoting to production" for the manual command.
  #       - Promote Prod

# ═══════════════════════════════════════════════════════════════════
# BUILD
# ═══════════════════════════════════════════════════════════════════
Build:
  tasks:
    - checkout
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail

            # ── Path gate ────────────────────────────────────────────
            # Skip the full build/scan/sign flow if no image-relevant
            # file changed in the last commit. Editing README, LICENSE,
            # renovate.json, .gitignore etc. writes SKIP=true to
            # build.env and exits cleanly — every downstream job
            # checks SKIP and no-ops when set. FORCE_ALL=true bypasses.
            if [ "${bamboo_FORCE_ALL:-false}" != "true" ]; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD \
                -- image.env image.env.example Dockerfile scripts/ certs/ bamboo-specs/bamboo.yaml 2>/dev/null \
                || git diff --name-only HEAD \
                -- image.env image.env.example Dockerfile scripts/ certs/ bamboo-specs/bamboo.yaml)
              if [ -z "$CHANGED" ]; then
                echo "No image-relevant changes — skipping"
                echo "SKIP=true" > build.env
                exit 0
              fi
              echo "Changed image-relevant files:"
              echo "$CHANGED" | sed 's/^/  /'
            fi

            # ── Bamboo global var → script-expected name shim ────────
            # build.sh auto-imports every bamboo_* env var as the
            # bare name. The exports below cover ONLY the cases where
            # the shared global has a different name (svc_*) than
            # build.sh expects. Everything else (INJECT_CERTS,
            # UPSTREAM_*, REGISTRY_KIND, ARTIFACTORY_URL, etc.) flows
            # through automatically — no per-var export here.
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export HARBOR_USER="${bamboo_svc_harbor_user:-${bamboo_HARBOR_USER:-}}"
            export HARBOR_PASSWORD="${bamboo_svc_harbor_password:-${bamboo_HARBOR_PASSWORD:-}}"

            # crane is needed for base.digest resolution in build.sh.
            # Falls back to docker buildx inspect if not present, but
            # we install proactively so the digest label always lands.
            if ! command -v crane >/dev/null 2>&1; then
              CRANE_URL_EFFECTIVE="${bamboo_CRANE_URL:-https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz}"
              mkdir -p "${HOME}/.local/bin"
              curl -sL "${CRANE_URL_EFFECTIVE}" | tar xz -C "${HOME}/.local/bin/" crane
              export PATH="${HOME}/.local/bin:${PATH}"
            fi

            # build.sh handles its own docker login (after sourcing
            # image.env) and its own jf install (via the artifactory
            # push backend). Don't do those here — image.env values
            # would not flow through to a pre-script login otherwise.
            bash ./scripts/build.sh --push
  artifacts:
    - name: build-env
      location: .
      pattern: build.env
      shared: true
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# POSTSCAN — Syft SBOM of the BUILT image
# ═══════════════════════════════════════════════════════════════════
Syft SBOM Postscan:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            # Relay creds the multi-registry login lib needs. Bamboo
            # plan vars arrive as bamboo_*; the script auto-imports them
            # via load-image-env.sh — these explicit shims cover the
            # bamboo_svc_* (renamed) variants.
            export HARBOR_USER="${bamboo_svc_harbor_user:-${bamboo_HARBOR_USER:-}}"
            export HARBOR_PASSWORD="${bamboo_svc_harbor_password:-${bamboo_HARBOR_PASSWORD:-}}"

            # Standalone Syft script. SBOM_FILE comes from build.env
            # (canonical name from scripts/lib/artifact-names.sh) so
            # the artifact pattern below picks up whatever name the
            # producer wrote.
            bash ./scripts/scan/syft-sbom.sh
  artifacts:
    - name: sbom
      location: .
      pattern: 'sbom.cdx.json'
      shared: true
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# PRESCAN — Syft SBOM of UPSTREAM_REF (before build runs)
# ═══════════════════════════════════════════════════════════════════
# Same script as the postscan variant, different target. Useful for
# early visibility on the upstream's component graph.
Syft SBOM Prescan:
  tasks:
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./image.env
            export SBOM_SCAN_REF="${UPSTREAM_REGISTRY}/${UPSTREAM_IMAGE}:${UPSTREAM_TAG}"
            bash ./scripts/scan/syft-sbom.sh
  artifacts:
    - name: sbom-prescan
      location: .
      pattern: 'sbom.cdx.json'
      shared: true
      required: false
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# POSTSCAN — Grype vulnerability scan (consumes Syft SBOM)
# ═══════════════════════════════════════════════════════════════════
Grype Vuln:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: sbom
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            # Optional Grype DB mirror auth. When ARTIFACTORY_GRYPE_DB_REPO
            # is set in image.env, grype-vuln.sh fetches the CVE DB from
            # an Artifactory mirror instead of grype.anchore.io — needs
            # ARTIFACTORY_USER + ARTIFACTORY_TOKEN/PASSWORD for that.
            # Harmless when the mirror isn't configured.
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"

            # Standalone Grype script — install, DB-mirror redirect,
            # scan against ${SBOM_FILE}, severity gate. Default output
            # is ${VULN_SCAN_FILE} (canonical: vuln-scan.json). Set
            # GRYPE_FAIL_ON_SEVERITY="Critical" (or "Critical,High")
            # in image.env / plan vars to make this a hard gate.
            bash ./scripts/scan/grype-vuln.sh
  artifacts:
    - name: vuln-scan-grype
      location: .
      pattern: vuln-scan.json
      shared: true
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# Xray scans — paired vuln + SBOM, split across Prescan / Postscan
# ═══════════════════════════════════════════════════════════════════
# Four jobs total — each single-responsibility, runs in parallel
# within its stage:
#   Xray Vuln Prescan  → scan UPSTREAM_REF, output vuln-scan.json
#   Xray SBOM Prescan  → scan UPSTREAM_REF, output sbom.cdx.json
#   Xray Vuln Postscan → scan IMAGE_DIGEST,  output vuln-scan.json
#   Xray SBOM Postscan → scan IMAGE_DIGEST,  output sbom.cdx.json
#
# All four scripts source scripts/lib/load-image-env.sh which auto-
# imports every bamboo_* env var → bare name. The shim blocks below
# only re-export vars whose Bamboo global-var name DIFFERS from what
# the script expects (svc_* prefixed service-account creds).
#
# Prescan jobs pass XRAY_SCAN_REF=UPSTREAM_REGISTRY/UPSTREAM_IMAGE:
# UPSTREAM_TAG explicitly so the script's resolution chain doesn't
# fall back to IMAGE_DIGEST (build hasn't run yet). Postscan jobs
# inherit IMAGE_DIGEST from build.env.
#
# Set XRAY_FAIL_ON_SEVERITY (in image.env or plan vars) to enforce a
# real gate. Otherwise this is audit-only.
Xray Vuln Prescan:
  tasks:
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail

            # Renamed shared globals → script-expected names.
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export SPLUNK_HEC_TOKEN="${bamboo_svc_splunk_hec_token:-${bamboo_SPLUNK_HEC_TOKEN:-}}"

            # Scan the upstream we're about to inherit from. The
            # script picks up UPSTREAM_REGISTRY/IMAGE/TAG from image.env
            # via load_image_env, so we just point XRAY_SCAN_REF at
            # the assembled ref.
            . ./image.env
            export XRAY_SCAN_REF="${UPSTREAM_REGISTRY}/${UPSTREAM_IMAGE}:${UPSTREAM_TAG}"

            bash ./scripts/scan/xray-vuln.sh
  artifacts:
    - name: xray-scan-prescan
      location: .
      pattern: vuln-scan.json
      shared: true
      required: false
  requirements:
    - system.docker.executable

Xray SBOM Prescan:
  tasks:
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail

            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export SPLUNK_HEC_TOKEN="${bamboo_svc_splunk_hec_token:-${bamboo_SPLUNK_HEC_TOKEN:-}}"

            . ./image.env
            export XRAY_SCAN_REF="${UPSTREAM_REGISTRY}/${UPSTREAM_IMAGE}:${UPSTREAM_TAG}"

            bash ./scripts/scan/xray-sbom.sh
  artifacts:
    - name: xray-sbom-prescan
      location: .
      pattern: sbom.cdx.json
      shared: true
      required: false
  requirements:
    - system.docker.executable

# ── POSTSCAN: scan the BUILT image (IMAGE_DIGEST from build.env) ──
# Default scan target is the rebuilt image — that's what consumers
# pull and what should be audited. Includes any remediation, cert
# injection, or Dockerfile editable-region customisations applied
# during build.
Xray Vuln Postscan:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export SPLUNK_HEC_TOKEN="${bamboo_svc_splunk_hec_token:-${bamboo_SPLUNK_HEC_TOKEN:-}}"

            # IMAGE_DIGEST is in env from `. ./build.env` above —
            # script auto-resolves to it.
            bash ./scripts/scan/xray-vuln.sh
  artifacts:
    - name: xray-scan-postscan
      location: .
      pattern: vuln-scan.json
      shared: true
      required: false
  requirements:
    - system.docker.executable

Xray SBOM Postscan:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export SPLUNK_HEC_TOKEN="${bamboo_svc_splunk_hec_token:-${bamboo_SPLUNK_HEC_TOKEN:-}}"

            bash ./scripts/scan/xray-sbom.sh
  artifacts:
    - name: xray-sbom-postscan
      location: .
      pattern: sbom.cdx.json
      shared: true
      required: false
  requirements:
    - system.docker.executable

