# container-image-template — Bamboo plan spec
#
# Atlassian YAML Specs v2 (NOT the reecetech custom dialect — that
# uses `type: SCRIPT` + `body: |`, this uses `script:` + `scripts: -`).
#
# 1:1 parity with .gitlab-ci.yml. Same stages, same scripts/build.sh
# entry point, same SBOM → Grype → Cosign → Xray-audit → Ingest →
# Promote flow. Runs on a Bamboo agent with docker installed
# (system.docker.executable capability) — no dind dance needed.
#
# ── HOW PLAN VARIABLES FLOW INTO build.sh ────────────────────────────
#
# Bamboo exposes plan variables and System → Global variables to
# script tasks as env vars with a `bamboo_` prefix (dots in the var
# name become underscores). build.sh now auto-imports every `bamboo_*`
# env var as the bare name BEFORE sourcing image.env, so a plan var
# named `REMEDIATE` automatically becomes `REMEDIATE` for the script.
#
# That auto-import only handles exact-name matches. For globally
# shared service-account vars whose Bamboo names DON'T match what
# build.sh expects (e.g. global `svc_artifactory_token` vs script's
# `ARTIFACTORY_TOKEN`), add a one-line export shim in the task script
# BEFORE invoking build.sh — see the Build job below for the pattern.
#
# Keep secrets in plan vars (encrypted), keep behavioural toggles in
# image.env (committed, in repo). Don't commit secrets to image.env.
#
# Required plan or global variables:
#
#   # Push backend (Harbor baseline — the default)
#   PUSH_REGISTRY            destination registry host
#   PUSH_PROJECT             destination project / path
#   PUSH_REGISTRY_USER       registry push username
#   PUSH_REGISTRY_PASSWORD   registry push password (masked)
#
#   # Optional: shared service-account global vars (mapped via shim)
#   svc_artifactory_token    → exported as ARTIFACTORY_TOKEN
#   svc_artifactory_user     → exported as ARTIFACTORY_USER
#   svc_splunk_hec_token     → exported as SPLUNK_HEC_TOKEN
#
#   # Optional: cosign signing (DORMANT — restore Cosign Sign job to use)
#   COSIGN_KEY               private key path or env: reference
#
#   # Optional: corp CA (auto-flips INJECT_CERTS=true inside build.sh)
#   CA_CERT                  PEM content of a corp CA
#
#   # Optional: closed-network tool mirrors. Defaults reach public
#   # GitHub releases — override only when the agent has no outbound
#   # internet.
#   APK_MIRROR               Alpine apk raw-proxy URL
#   CRANE_URL                go-containerregistry tarball URL
#   SYFT_INSTALLER_URL       Syft install.sh URL
#   GRYPE_INSTALLER_URL      Grype install.sh URL
#   COSIGN_URL               cosign-linux-amd64 binary URL
#   JF_BINARY_URL            direct jf binary URL (preferred)
#   JF_DEB_URL               .deb pkg URL (extracted, no dpkg -i)
#   JF_RPM_URL               .rpm pkg URL (extracted, no rpm -i)
#
#   # Optional: SBOM ingestion
#   SBOM_WEBHOOK_URL         generic CycloneDX webhook endpoint
#   SBOM_WEBHOOK_AUTH_HEADER auth header for the webhook
#   DEPENDENCY_TRACK_URL     OWASP Dependency-Track base URL
#   DEPENDENCY_TRACK_API_KEY DT BOM-upload API key
#   DEPENDENCY_TRACK_PROJECT DT project name
#
#   # Optional: Xray scan → Splunk audit
#   SPLUNK_HEC_URL           Splunk HEC endpoint
#   SPLUNK_HEC_TOKEN         HEC token (preferably via shim from svc_*)
#
#   # Production promotion is INTENTIONALLY not in this pipeline —
#   # human ritual via Artifactory's native copy UI. See README
#   # "Promoting to production".
#
# image.env (committed) is the single source of truth for build
# behaviour (REMEDIATE, INJECT_CERTS, REGISTRY_KIND, UPSTREAM_*,
# Artifactory layout templates, etc.). Plan vars only carry secrets
# and per-environment overrides.
#
# ── ENABLING BUILD_DEBUG ─────────────────────────────────────────────
# Add a plan variable named `BUILD_DEBUG` with value `true` to get
# verbose "why did this decision happen?" logging from build.sh in
# the Bamboo log. Auto-imported by build.sh — no shim needed.

---
version: 2

plan:
  project-key: DEVOPS
  key: CIT
  name: Container Image Template
  description: |-
    Builds, scans, signs, and promotes a single container image
    based on the upstream pinned in image.env. Pipeline mirrors
    .gitlab-ci.yml stage-for-stage.

# Polling: integer = seconds. Bamboo polls the linked repository at
# this interval and triggers the plan on detected changes. The linked
# repository is the one this bamboo-specs/ file lives in (added at
# plan creation in the Bamboo UI), so no `repositories:` block needed.
triggers:
  - polling: 60

stages:
  - Build:
      jobs:
        - Build
  - Scan:
      jobs:
        - SBOM
        - Grype
        - Xray Audit
        # - Trivy   # Disabled: banned for business use.
  # - Sign:           # COMMENTED OUT — no cosign infra at work yet.
  #     jobs:        # Restore by uncommenting both this stage and the
  #       - Cosign Sign  # `Cosign Sign:` job block further down.
  - Ingest:
      jobs:
        - SBOM Ingest
  # - Promote:        # REMOVED — production promotion is a human ritual
  #     manual: true  # via Artifactory's native copy UI. See README
  #     jobs:         # "Promoting to production" for the manual command.
  #       - Promote Prod

# ═══════════════════════════════════════════════════════════════════
# BUILD
# ═══════════════════════════════════════════════════════════════════
Build:
  tasks:
    - checkout
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail

            # ── Path gate ────────────────────────────────────────────
            # Skip the full build/scan/sign flow if no image-relevant
            # file changed in the last commit. Editing README, LICENSE,
            # renovate.json, .gitignore etc. writes SKIP=true to
            # build.env and exits cleanly — every downstream job
            # checks SKIP and no-ops when set. FORCE_ALL=true bypasses.
            if [ "${bamboo_FORCE_ALL:-false}" != "true" ]; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD \
                -- image.env image.env.example Dockerfile scripts/ certs/ bamboo-specs/bamboo.yaml 2>/dev/null \
                || git diff --name-only HEAD \
                -- image.env image.env.example Dockerfile scripts/ certs/ bamboo-specs/bamboo.yaml)
              if [ -z "$CHANGED" ]; then
                echo "No image-relevant changes — skipping"
                echo "SKIP=true" > build.env
                exit 0
              fi
              echo "Changed image-relevant files:"
              echo "$CHANGED" | sed 's/^/  /'
            fi

            # ── Bamboo global var → script-expected name shim ────────
            # build.sh auto-imports every bamboo_* env var as the
            # bare name. The exports below cover ONLY the cases where
            # the shared global has a different name (svc_*) than
            # build.sh expects. Everything else (REMEDIATE, DISTRO,
            # UPSTREAM_*, REGISTRY_KIND, ARTIFACTORY_URL, etc.) flows
            # through automatically — no per-var export here.
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export PUSH_REGISTRY_USER="${bamboo_svc_push_registry_user:-${bamboo_PUSH_REGISTRY_USER:-}}"
            export PUSH_REGISTRY_PASSWORD="${bamboo_svc_push_registry_password:-${bamboo_PUSH_REGISTRY_PASSWORD:-}}"

            # Log into the Harbor-style push target (no-op when the
            # backend is artifactory and PUSH_REGISTRY_USER unset).
            if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ] && [ -n "${bamboo_PUSH_REGISTRY:-}" ]; then
              echo "${PUSH_REGISTRY_PASSWORD}" | docker login "${bamboo_PUSH_REGISTRY}" \
                -u "${PUSH_REGISTRY_USER}" --password-stdin
            fi

            # Artifactory backend: install jf via shared helper, log
            # docker into the Artifactory push host. build.sh handles
            # the rest via the artifactory.sh backend.
            if [ "${bamboo_REGISTRY_KIND:-}" = "artifactory" ]; then
              # shellcheck source=../scripts/lib/install-jf.sh
              . ./scripts/lib/install-jf.sh
              install_jf
              jf --version

              ART_HOST="${bamboo_ARTIFACTORY_PUSH_HOST:-}"
              if [ -z "${ART_HOST}" ] && [ -n "${bamboo_ARTIFACTORY_URL:-}" ]; then
                ART_HOST="${bamboo_ARTIFACTORY_URL#https://}"
                ART_HOST="${ART_HOST#http://}"
                ART_HOST="${ART_HOST%%/*}"
              fi
              if [ -n "${ART_HOST}" ] && [ -n "${ARTIFACTORY_USER:-}" ]; then
                echo "${ARTIFACTORY_TOKEN:-${bamboo_ARTIFACTORY_PASSWORD:-}}" \
                  | docker login "${ART_HOST}" -u "${ARTIFACTORY_USER}" --password-stdin
              fi
            fi

            # crane is needed for base.digest resolution in build.sh.
            # Falls back to docker buildx inspect if not present, but
            # we install proactively so the digest label always lands.
            if ! command -v crane >/dev/null 2>&1; then
              CRANE_URL_EFFECTIVE="${bamboo_CRANE_URL:-https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz}"
              mkdir -p "${HOME}/.local/bin"
              curl -sL "${CRANE_URL_EFFECTIVE}" | tar xz -C "${HOME}/.local/bin/" crane
              export PATH="${HOME}/.local/bin:${PATH}"
            fi

            bash ./scripts/build.sh --push
  artifacts:
    - name: build-env
      location: .
      pattern: build.env
      shared: true
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# SCAN — SBOM (Syft → CycloneDX)
# ═══════════════════════════════════════════════════════════════════
SBOM:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            export PUSH_REGISTRY_USER="${bamboo_svc_push_registry_user:-${bamboo_PUSH_REGISTRY_USER:-}}"
            export PUSH_REGISTRY_PASSWORD="${bamboo_svc_push_registry_password:-${bamboo_PUSH_REGISTRY_PASSWORD:-}}"

            if ! command -v syft >/dev/null 2>&1; then
              SYFT_INSTALLER_URL_EFFECTIVE="${bamboo_SYFT_INSTALLER_URL:-https://raw.githubusercontent.com/anchore/syft/main/install.sh}"
              mkdir -p "${HOME}/.local/bin"
              curl -sSfL "${SYFT_INSTALLER_URL_EFFECTIVE}" \
                | sh -s -- -b "${HOME}/.local/bin" v1.14.0
              export PATH="${HOME}/.local/bin:${PATH}"
            fi

            if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${bamboo_PUSH_REGISTRY:-}" ]; then
              echo "${PUSH_REGISTRY_PASSWORD}" | docker login "${bamboo_PUSH_REGISTRY}" \
                -u "${PUSH_REGISTRY_USER}" --password-stdin
            fi

            SCAN_TARGET="${IMAGE_DIGEST:-${IMAGE_REF}}"
            echo "→ syft ${SCAN_TARGET}"
            syft "${SCAN_TARGET}" \
              -o cyclonedx-json=sbom.cdx.json \
              -o spdx-json=sbom.spdx.json \
              -o syft-json=sbom.syft.json
            ls -la sbom.*.json
  artifacts:
    - name: sbom
      location: .
      pattern: 'sbom.*.json'
      shared: true
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# SCAN — Grype (SBOM-first vulnerability scan)
# ═══════════════════════════════════════════════════════════════════
Grype:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: sbom
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            if ! command -v grype >/dev/null 2>&1; then
              GRYPE_INSTALLER_URL_EFFECTIVE="${bamboo_GRYPE_INSTALLER_URL:-https://raw.githubusercontent.com/anchore/grype/main/install.sh}"
              mkdir -p "${HOME}/.local/bin"
              curl -sSfL "${GRYPE_INSTALLER_URL_EFFECTIVE}" \
                | sh -s -- -b "${HOME}/.local/bin" v0.82.0
              export PATH="${HOME}/.local/bin:${PATH}"
            fi

            echo "→ grype sbom:sbom.cdx.json"
            grype sbom:sbom.cdx.json --output json --file grype-report.json --fail-on "" || true
            grype sbom:sbom.cdx.json --output table || true

            if command -v jq >/dev/null 2>&1; then
              echo ""
              echo "→ Vulnerability summary:"
              for sev in Critical High Medium Low Negligible Unknown; do
                count=$(jq "[.matches[] | select(.vulnerability.severity==\"${sev}\")] | length" grype-report.json)
                echo "    ${sev}: ${count}"
              done
            fi
  artifacts:
    - name: grype-report
      location: .
      pattern: grype-report.json
      shared: true
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# SCAN — Xray audit → Splunk
# ═══════════════════════════════════════════════════════════════════
# Runs `jf docker scan` against the upstream image and ships the
# JSON to Splunk HEC for SecOps audit. No-op when SPLUNK_HEC_URL
# or SPLUNK_HEC_TOKEN is unset (so the stage stays green before
# Splunk is wired up).
Xray Audit:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            # Splunk + Artifactory secrets via global-var shim.
            # ARTIFACTORY_URL / _PROJECT come straight from bamboo
            # plan vars (no rename) — re-export here because this
            # script doesn't go through build.sh's auto-importer.
            export SPLUNK_HEC_TOKEN="${bamboo_svc_splunk_hec_token:-${bamboo_SPLUNK_HEC_TOKEN:-}}"
            export SPLUNK_HEC_URL="${bamboo_SPLUNK_HEC_URL:-}"
            export SPLUNK_HEC_INDEX="${bamboo_SPLUNK_HEC_INDEX:-}"
            export SPLUNK_HEC_SOURCETYPE="${bamboo_SPLUNK_HEC_SOURCETYPE:-}"
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export ARTIFACTORY_URL="${bamboo_ARTIFACTORY_URL:-}"
            export ARTIFACTORY_PROJECT="${bamboo_ARTIFACTORY_PROJECT:-}"
            export JF_BINARY_URL="${bamboo_JF_BINARY_URL:-}"
            export JF_DEB_URL="${bamboo_JF_DEB_URL:-}"
            export JF_RPM_URL="${bamboo_JF_RPM_URL:-}"

            bash ./scripts/xray-scan-post.sh
  artifacts:
    - name: xray-scan
      location: .
      pattern: xray-scan.json
      shared: true
      required: false
    - name: xray-sbom
      location: .
      pattern: xray-sbom.cdx.json
      shared: true
      required: false
  requirements:
    - system.docker.executable

