# ═══════════════════════════════════════════════════════════════════
# INGEST — SBOM post to configured sinks
# ═══════════════════════════════════════════════════════════════════
SBOM Ingest:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: sbom
            destination: .
    - script:
        interpreter: BASH
        scripts:
          - |-
            set -euo pipefail
            . ./build.env
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            # Sink secrets via global-var shim. Auto-import handles the
            # non-secret URL/project vars (DEPENDENCY_TRACK_URL etc.).
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export DEPENDENCY_TRACK_API_KEY="${bamboo_svc_dependency_track_api_key:-${bamboo_DEPENDENCY_TRACK_API_KEY:-}}"
            export SBOM_WEBHOOK_AUTH_HEADER="${bamboo_svc_sbom_webhook_auth_header:-${bamboo_SBOM_WEBHOOK_AUTH_HEADER:-}}"

            bash ./scripts/sbom-post.sh sbom.cdx.json
  requirements:
    - system.docker.executable

# ═══════════════════════════════════════════════════════════════════
# PROMOTE — REMOVED. Manual via Artifactory's native copy UI.
# ═══════════════════════════════════════════════════════════════════
# After validating the dev image, a human promotes to prod by either:
#   - Artifactory UI: Browse → <repo>/<image>/<tag> → "Copy" or "Move"
#   - CLI:  crane copy <dev-digest> <prod-registry>/<project>/<image>:<tag>
# Same digest preserved either way. See README "Promoting to production"
# for the exact crane invocation and required auth setup.
