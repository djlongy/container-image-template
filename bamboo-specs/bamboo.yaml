# corresponding entries in the Prescan / Postscan stage lists at the
# top of the file. Scripts pin Trivy to v0.69.3 (the last safe
# pre-compromise binary) and refuse v0.69.4–v0.69.6 — see the security
# note at the top of scripts/scan/trivy-vuln.sh.
