# ═══════════════════════════════════════════════════════════════════
# SIGN — cosign sign + SBOM/Grype attestations  (DORMANT)
# ═══════════════════════════════════════════════════════════════════
# Restore by uncommenting the `Cosign Sign:` block below AND the
# matching `- Sign:` entry in the stages list at the top. Configure
# COSIGN_KEY as a Bamboo plan variable (file: type) that points at
# Vault transit / KMS rather than holding raw key material.
#
# Cosign Sign:
#   tasks:
#     - artifact-download:
